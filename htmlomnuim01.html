<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnium — Rider Profiling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #1A1A1A;
  --ink2:     #666;
  --ink3:     #999;
  --rule:     #E0E0E0;
  --rule2:    #EBEBEB;
  --bg:       #FAFAF8;
  --white:    #FFFFFF;
  --end:      #1A6640;
  --spr:      #8B1A1A;
  --neu:      #1A3666;
  --end-light:#D6EDE3;
  --spr-light:#F5DADA;
  --neu-light:#D6E0F5;
  --accent:   #1A1A1A;
  --r:        4px;
  --sans:     'IBM Plex Sans', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
  --serif:    'Literata', serif;
}

html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; }

/* ── Header ──────────────────────────────────────────────────────── */
.site-header {
  background: var(--white);
  border-bottom: 1.5px solid var(--ink);
  padding: 0 32px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: .01em;
  color: var(--ink);
  text-decoration: none;
  white-space: nowrap;
}
.logo em { font-style: italic; font-weight: 300; }
.header-sep { flex: 1; }
.header-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: .04em;
}
.save-status {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color .2s;
}
.save-status.saved { color: var(--end); }
.save-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}

/* ── Progress bar ────────────────────────────────────────────────── */
.progress-bar {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.prog-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  white-space: nowrap;
}
.prog-track {
  flex: 1;
  height: 2px;
  background: var(--rule);
}
.prog-fill {
  height: 100%;
  background: var(--ink);
  transition: width .35s ease;
}
.prog-pct {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  min-width: 32px;
  text-align: right;
}

/* ── Controls ────────────────────────────────────────────────────── */
.controls {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.filter-group { display: flex; gap: 2px; }
.fbtn {
  height: 28px;
  padding: 0 11px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: transparent;
  color: var(--ink2);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  transition: all .1s;
  white-space: nowrap;
}
.fbtn:hover { border-color: var(--ink); color: var(--ink); }
.fbtn.on { background: var(--ink); color: var(--white); border-color: var(--ink); }

.search-box {
  height: 28px;
  padding: 0 10px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: transparent;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 12px;
  width: 220px;
  outline: none;
  transition: border-color .1s;
}
.search-box::placeholder { color: var(--ink3); }
.search-box:focus { border-color: var(--ink); }

.sort-sel {
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: transparent;
  color: var(--ink2);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  outline: none;
  margin-left: auto;
}
.sort-sel:focus { border-color: var(--ink); }

/* ── Layout ──────────────────────────────────────────────────────── */
.page { max-width: 1080px; padding: 28px 32px 60px; }

.section-rule {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}
.section-name {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 15px;
  font-style: italic;
}
.section-stat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
}

/* ── Rider grid ──────────────────────────────────────────────────── */
.rider-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-bottom: 28px;
}
.rider-card {
  background: var(--white);
  padding: 14px 16px 12px;
  transition: background .1s;
}
.rider-card:hover { background: #FDFDFB; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}
.card-name {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 13.5px;
  line-height: 1.2;
  color: var(--ink);
}
.card-name small {
  font-size: 11px;
  font-weight: 300;
  font-style: italic;
  color: var(--ink2);
  display: block;
  margin-top: 2px;
}
.card-tags {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  flex-shrink: 0;
}
.tag {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink3);
  letter-spacing: .04em;
}

/* ── Gauge ───────────────────────────────────────────────────────── */
.gauge-wrap { display: flex; flex-direction: column; gap: 5px; }

.gauge-ends {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.end-label { color: var(--end); }
.spr-label { color: var(--spr); }

.g-track {
  position: relative;
  height: 6px;
  background: var(--rule2);
  cursor: pointer;
  user-select: none;
  touch-action: none;
}
.g-fill-e {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--end-light);
  border-right: 1px solid var(--end);
  pointer-events: none;
}
.g-fill-s {
  position: absolute; right: 0; top: 0; height: 100%;
  background: var(--spr-light);
  border-left: 1px solid var(--spr);
  pointer-events: none;
}
.g-mid {
  position: absolute; left: 50%; top: -2px;
  width: 1px; height: 10px;
  background: var(--rule);
  pointer-events: none;
}
.g-thumb {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--white);
  border: 1.5px solid var(--ink2);
  cursor: grab;
  transform: translate(-50%, -50%);
  top: 50%;
  transition: border-color .1s;
  z-index: 2;
}
.g-thumb:active { cursor: grabbing; border-color: var(--ink); }
.g-track:hover .g-thumb { border-color: var(--ink); }

.g-result {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.g-chip {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 2px;
  font-weight: 500;
}
.chip-e   { background: var(--end-light);  color: var(--end); }
.chip-s   { background: var(--spr-light);  color: var(--spr); }
.chip-n   { background: var(--neu-light);  color: var(--neu); }
.chip-nil { background: var(--rule2); color: var(--ink3); }
.g-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
}

/* ── Upload/Download section ─────────────────────────────────────── */
.io-section {
  border-top: 1.5px solid var(--ink);
  padding-top: 28px;
  margin-top: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 640px) { .io-section { grid-template-columns: 1fr; } }

.io-block {
  border: 1px solid var(--rule);
  padding: 20px;
  background: var(--white);
}
.io-title {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 13px;
  color: var(--ink2);
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule2);
}
.io-desc {
  font-size: 12px;
  color: var(--ink2);
  line-height: 1.6;
  margin-bottom: 14px;
}

.upload-zone {
  border: 1px dashed var(--rule);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  margin-bottom: 10px;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--ink); background: #F8F8F6; }
.upload-zone input { display: none; }
.upload-icon { font-size: 22px; margin-bottom: 6px; }
.upload-text {
  font-size: 12px;
  color: var(--ink2);
  line-height: 1.5;
}
.upload-text strong { color: var(--ink); font-weight: 500; }
.upload-status {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--end);
  text-align: center;
  min-height: 16px;
  margin-top: 4px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  padding: 0 16px;
  border: 1.5px solid var(--ink);
  background: var(--white);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 2px;
  transition: all .1s;
  text-decoration: none;
}
.btn:hover { background: var(--ink); color: var(--white); }
.btn.primary { background: var(--ink); color: var(--white); }
.btn.primary:hover { opacity: .85; }
.btn svg { width: 13px; height: 13px; }

.preview-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
  font-size: 11px;
}
.preview-table th {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--ink3);
  text-align: left;
  padding: 5px 8px;
  border-bottom: 1px solid var(--rule);
  font-weight: 400;
}
.preview-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--rule2);
  color: var(--ink);
  font-family: var(--sans);
}
.preview-table tr:last-child td { border-bottom: none; }
.td-pct {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}
.td-profile {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 2px;
  font-family: var(--mono);
  letter-spacing: .04em;
  display: inline-block;
}
.preview-more {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  text-align: center;
  padding: 8px;
  border-top: 1px solid var(--rule2);
  margin-top: 4px;
}

/* ── Toast ───────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--ink);
  color: var(--white);
  padding: 9px 16px;
  border-radius: 2px;
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Empty state ─────────────────────────────────────────────────── */
.empty-state {
  grid-column: 1/-1;
  padding: 40px 20px;
  text-align: center;
  color: var(--ink3);
  font-size: 13px;
  font-style: italic;
  font-family: var(--serif);
}
</style>
</head>

/* ── State ─────────────────────────────────────────────────────── */
const KEY = 'omnium_ratings_v2';
const ratings = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } })();

let filter = 'all', searchQ = '', sortBy = 'name', dragging = null;

/* ── Profile helpers ────────────────────────────────────────────── */
function profile(v) {
  if (v == null) return null;
  if (v <= 35)  return { label: 'Endurance', cls: 'chip-e',  short: 'E' };
  if (v >= 65)  return { label: 'Sprint',    cls: 'chip-s',  short: 'S' };
  return             { label: 'Balanced',   cls: 'chip-n',  short: 'B' };
}
function endPct(v) { return v <= 50 ? Math.round((50-v)*2) : 0; }
function sprPct(v) { return v >= 50 ? Math.round((v-50)*2) : 0; }

/* ── Filter / sort ──────────────────────────────────────────────── */
function filtered() {
  let list = [...RIDERS];
  if (filter === 'men')     list = list.filter(r => r.gender === 'Men');
  if (filter === 'women')   list = list.filter(r => r.gender === 'Women');
  if (filter === 'rated')   list = list.filter(r => ratings[r.id] != null);
  if (filter === 'unrated') list = list.filter(r => ratings[r.id] == null);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(r => r.name.toLowerCase().includes(q) || r.nat.toLowerCase().includes(q));
  }
  list.sort((a,b) => {
    if (sortBy === 'rank')     return a.best_rank - b.best_rank;
    if (sortBy === 'editions') return b.years.length - a.years.length;
    if (sortBy === 'profile') {
      const va = ratings[a.id] ?? 50, vb = ratings[b.id] ?? 50;
      return va - vb;
    }
    return a.name.localeCompare(b.name);
  });
  return list;
}

/* ── Progress ───────────────────────────────────────────────────── */
function updateProgress() {
  const n = Object.keys(ratings).length, total = RIDERS.length;
  const pct = Math.round(n / total * 100);
  document.getElementById('prog-label').textContent = `${n} of ${total} rated`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

/* ── Save ───────────────────────────────────────────────────────── */
let saveTimer;
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(ratings)); } catch(e) {}
  const st = document.getElementById('save-status');
  const tx = document.getElementById('save-text');
  st.classList.add('saved');
  tx.textContent = 'Saved';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { st.classList.remove('saved'); tx.textContent = 'Auto-saved'; }, 1400);
}

/* ── Card HTML ──────────────────────────────────────────────────── */
function cardHTML(r) {
  const v   = ratings[r.id] ?? 50;
  const rated = ratings[r.id] != null;
  const ep  = endPct(v), sp = sprPct(v);
  const prof = rated ? profile(v) : null;
  const chipHTML = rated
    ? `<span class="g-chip ${prof.cls}">${prof.label}</span><span class="g-num">${v}</span>`
    : `<span class="g-chip chip-nil">—</span>`;

  return `<div class="rider-card" id="card-${r.id}">
  <div class="card-top">
    <div class="card-name">
      ${r.name}
      <small>${r.nat} · best rank #${r.best_rank}</small>
    </div>
    <div class="card-tags">
      <span class="tag">${r.gender}</span>
      <span class="tag">${r.years.sort().join(' · ')}</span>
    </div>
  </div>
  <div class="gauge-wrap">
    <div class="gauge-ends">
      <span class="end-label">Endurance</span>
      <span class="spr-label">Sprint</span>
    </div>
    <div class="g-track" id="track-${r.id}"
         onmousedown="dragStart(event,'${r.id}')"
         ontouchstart="dragStartT(event,'${r.id}')">
      <div class="g-fill-e" style="width:${ep}%"></div>
      <div class="g-fill-s" style="width:${sp}%"></div>
      <div class="g-mid"></div>
      <div class="g-thumb" style="left:${v}%"></div>
    </div>
    <div class="g-result">${chipHTML}</div>
  </div>
</div>`;
}

/* ── Render ─────────────────────────────────────────────────────── */
function render() {
  const list   = filtered();
  const page   = document.getElementById('page');
  const men    = list.filter(r => r.gender === 'Men');
  const women  = list.filter(r => r.gender === 'Women');
  const showSections = (filter === 'all' || filter === 'rated' || filter === 'unrated') && men.length && women.length;

  let html = '';
  if (showSections) {
    html += section('Men',   men)   + section('Women', women);
  } else if (men.length)   { html += section('Men', men); }
  else if (women.length)   { html += section('Women', women); }
  else { html = '<div class="rider-grid"><div class="empty-state">No riders match your search.</div></div>'; }

  // Always render IO section at the bottom
  html += ioSection();
  page.innerHTML = html;
  updateProgress();
  updatePreview();
}

function section(title, riders) {
  const ratedN = riders.filter(r => ratings[r.id] != null).length;
  return `<div class="section-rule">
    <span class="section-name">${title}</span>
    <span class="section-stat">${ratedN} / ${riders.length} rated</span>
  </div>
  <div class="rider-grid">${riders.length ? riders.map(cardHTML).join('') : '<div class="empty-state">None found.</div>'}</div>`;
}

function ioSection() {
  return `<div class="io-section">
  <div class="io-block">
    <div class="io-title">Export your ratings</div>
    <div class="io-desc">Download a CSV with all 120 riders, their profile value (0 = full endurance, 100 = full sprint) and label.</div>
    <button class="btn primary" onclick="exportCSV()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download CSV
    </button>
    <div id="preview-wrap"></div>
  </div>

  <div class="io-block">
    <div class="io-title">Import previous ratings</div>
    <div class="io-desc">Have a CSV from a previous session? Drop it here to reload your ratings exactly where you left off.</div>
    <label class="upload-zone" id="upload-zone" ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="dropFile(event)">
      <input type="file" accept=".csv" onchange="loadFile(this.files[0])">
      <div class="upload-icon">↑</div>
      <div class="upload-text"><strong>Click to choose</strong> or drag a CSV here</div>
    </label>
    <div class="upload-status" id="upload-status"></div>
  </div>
</div>`;
}

/* ── Live apply rating (no full re-render) ──────────────────────── */
function apply(id, v) {
  ratings[id] = v;
  const card  = document.getElementById('card-'+id);
  if (!card) return;
  const track = document.getElementById('track-'+id);
  track.querySelector('.g-thumb').style.left = v + '%';
  track.querySelector('.g-fill-e').style.width = endPct(v) + '%';
  track.querySelector('.g-fill-s').style.width = sprPct(v) + '%';
  const res = card.querySelector('.g-result');
  const prof = profile(v);
  res.innerHTML = `<span class="g-chip ${prof.cls}">${prof.label}</span><span class="g-num">${v}</span>`;
  updateProgress();
  save();
  updatePreview();
}

/* ── Drag ────────────────────────────────────────────────────────── */
function pctOf(track, cx) {
  const r = track.getBoundingClientRect();
  return Math.max(0, Math.min(100, Math.round((cx - r.left) / r.width * 100)));
}
function dragStart(e, id)  { e.preventDefault(); dragging = id; apply(id, pctOf(document.getElementById('track-'+id), e.clientX)); }
function dragStartT(e, id) { e.preventDefault(); dragging = id; apply(id, pctOf(document.getElementById('track-'+id), e.touches[0].clientX)); }
document.addEventListener('mousemove', e => { if (!dragging) return; const t = document.getElementById('track-'+dragging); if(t) apply(dragging, pctOf(t, e.clientX)); });
document.addEventListener('touchmove', e => { if (!dragging) return; const t = document.getElementById('track-'+dragging); if(t) apply(dragging, pctOf(t, e.touches[0].clientX)); }, {passive:false});
document.addEventListener('mouseup',  () => { dragging = null; });
document.addEventListener('touchend', () => { dragging = null; });

/* ── Filter / sort controls ─────────────────────────────────────── */
function setFilter(f) {
  filter = f;
  ['all','men','women','rated','unrated'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.className = 'fbtn' + (k === f ? ' on' : '');
  });
  render();
}
function doSearch(v) { searchQ = v.toLowerCase(); render(); }
function doSort(v)   { sortBy = v; render(); }

/* ── Preview table (live) ────────────────────────────────────────── */
function updatePreview() {
  const wrap = document.getElementById('preview-wrap');
  if (!wrap) return;
  const rated = RIDERS.filter(r => ratings[r.id] != null)
    .sort((a,b) => ratings[a.id] - ratings[b.id]);
  if (!rated.length) { wrap.innerHTML = ''; return; }

  const show = rated.slice(0,6);
  const more = rated.length - show.length;

  const chipStyle = v => {
    const p = profile(v);
    if (!p) return '';
    if (p.label==='Endurance') return 'background:#D6EDE3;color:#1A6640';
    if (p.label==='Sprint')    return 'background:#F5DADA;color:#8B1A1A';
    return 'background:#D6E0F5;color:#1A3666';
  };

  const rows = show.map(r => {
    const v = ratings[r.id];
    const p = profile(v);
    const endPctVal = v <= 50 ? (50-v)*2 : 0;
    const sprPctVal = v >= 50 ? (v-50)*2 : 0;
    const pctDisplay = v <= 50
      ? `<span style="color:var(--end);font-weight:500">${endPctVal}% end.</span>`
      : v >= 50 && v !== 50
      ? `<span style="color:var(--spr);font-weight:500">${sprPctVal}% spr.</span>`
      : `<span style="color:var(--neu-light)">balanced</span>`;
    return `<tr>
      <td>${r.name}</td>
      <td style="color:var(--ink2)">${r.nat}</td>
      <td class="td-pct">${v}</td>
      <td>${pctDisplay}</td>
      <td><span class="td-profile" style="${chipStyle(v)}">${p.label}</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="preview-table">
    <thead><tr><th>Name</th><th>NAT</th><th>Value</th><th>Breakdown</th><th>Profile</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>${more > 0 ? `<div class="preview-more">+ ${more} more rated riders</div>` : ''}`;
}

/* ── Export CSV ──────────────────────────────────────────────────── */
function exportCSV() {
  const lines = ['rider_id,name,nat,gender,years,best_rank,profile_value,endurance_pct,sprint_pct,profile_label,analyst_note'];
  RIDERS.forEach(r => {
    const v = ratings[r.id] != null ? ratings[r.id] : '';
    const ep = v !== '' ? (v <= 50 ? (50-v)*2 : 0) : '';
    const sp = v !== '' ? (v >= 50 ? (v-50)*2 : 0) : '';
    const lbl = v !== '' ? profile(v).label : '';
    lines.push([
      r.id,
      '"'+r.name+'"',
      r.nat,
      r.gender,
      '"'+r.years.sort().join(',')+'"',
      r.best_rank,
      v,
      ep !== '' ? ep+'%' : '',
      sp !== '' ? sp+'%' : '',
      lbl,
      ''
    ].join(','));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = Object.assign(document.createElement('a'), {href: URL.createObjectURL(blob), download: 'omnium_profiles.csv'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast(`Downloaded — ${Object.keys(ratings).length} riders rated`);
}

/* ── Import CSV ──────────────────────────────────────────────────── */
function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n');
    const header = lines[0].split(',');
    const idIdx  = header.indexOf('rider_id');
    const valIdx = header.indexOf('profile_value');
    if (idIdx < 0 || valIdx < 0) {
      setUploadStatus('CSV must have columns rider_id and profile_value', 'error');
      return;
    }
    let count = 0;
    lines.slice(1).forEach(line => {
      const cols = line.split(',');
      const id   = cols[idIdx]?.trim();
      const raw  = cols[valIdx]?.trim();
      if (id && raw !== '' && raw != null) {
        const v = parseInt(raw);
        if (!isNaN(v) && v >= 0 && v <= 100) { ratings[id] = v; count++; }
      }
    });
    save();
    render();
    setUploadStatus(`Imported ${count} ratings`, 'ok');
    toast(`${count} ratings loaded from CSV`);
  };
  reader.readAsText(file);
}

function setUploadStatus(msg, type) {
  const el = document.getElementById('upload-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'error' ? 'var(--spr)' : 'var(--end)';
}

function dragOver(e)  { e.preventDefault(); document.getElementById('upload-zone')?.classList.add('drag'); }
function dragLeave()  { document.getElementById('upload-zone')?.classList.remove('drag'); }
function dropFile(e)  { e.preventDefault(); dragLeave(); const f = e.dataTransfer.files[0]; if(f) loadFile(f); }

/* ── Toast ───────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── Init ────────────────────────────────────────────────────────── */
render();
if (Object.keys(ratings).length > 0) {
  document.getElementById('save-text').textContent = 'Auto-saved';
}
</script>
</body>
</html>
